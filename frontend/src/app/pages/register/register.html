<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Task Manager</h1>
      <p>Create your account</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="field-row">
        <div class="field">
          <label>First Name <span class="req">*</span></label>
          <input
            formControlName="firstName"
            placeholder="John"
            [class.invalid]="form.get('firstName')?.invalid && form.get('firstName')?.touched"
          />
          <span class="field-hint" [class.visible]="form.get('firstName')?.invalid && form.get('firstName')?.touched">Required</span>
        </div>

        <div class="field">
          <label>Last Name <span class="req">*</span></label>
          <input
            formControlName="lastName"
            placeholder="Doe"
            [class.invalid]="form.get('lastName')?.invalid && form.get('lastName')?.touched"
          />
          <span class="field-hint" [class.visible]="form.get('lastName')?.invalid && form.get('lastName')?.touched">Required</span>
        </div>
      </div>

      <div class="field">
        <label>Email <span class="req">*</span></label>
        <input
          formControlName="email"
          type="email"
          placeholder="you@example.com"
          [class.invalid]="form.get('email')?.invalid && form.get('email')?.touched"
        />
        <span class="field-hint" [class.visible]="form.get('email')?.invalid && form.get('email')?.touched">Enter a valid email address</span>
      </div>

      <div class="field">
        <label>Password <span class="req">*</span></label>
        <input
          formControlName="password"
          type="password"
          placeholder="••••••"
          [class.invalid]="form.get('password')?.invalid && form.get('password')?.touched"
        />
        <span class="field-hint visible">
          {{ form.get('password')?.invalid && form.get('password')?.touched ? 'Too short' : 'At least 6 characters' }}
        </span>
      </div>

      <div class="field">
        <label>Confirm Password <span class="req">*</span></label>
        <input
          formControlName="confirmPassword"
          type="password"
          placeholder="••••••"
          [class.invalid]="form.hasError('mismatch') && form.get('confirmPassword')?.touched"
        />
        <span class="field-hint" [class.visible]="form.hasError('mismatch') && form.get('confirmPassword')?.touched">Passwords do not match</span>
      </div>

      @if (errorMessage()) {
        <div class="error-banner">{{ errorMessage() }}</div>
      }

      <button type="submit" class="btn-primary" [disabled]="form.invalid">Create account</button>
    </form>

    <p class="auth-switch">Already have an account? <a routerLink="/login">Sign in</a></p>
  </div>
</div>
